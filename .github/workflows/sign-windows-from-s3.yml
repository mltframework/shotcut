name: sign-shotcut-windows-from-s3

on:
  workflow_dispatch:
    inputs:
      version-manual:
        description: Optional Shotcut version (for example 26.6.18). If empty, use today's date.
        required: false
        type: string

jobs:
  sign-and-package:
    if: ${{ github.repository_owner == 'mltframework' }}
    runs-on: windows-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}
      SM_API_KEY: ${{ secrets.SM_API_KEY }}
      SM_CLIENT_CERT_FILE: ${{ github.workspace }}/Certificate_pkcs12.p12
      SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
      SM_HOST: ${{ vars.SM_HOST }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            unzip zip xz

      - name: Set version
        id: set_version
        shell: msys2 {0}
        run: |
          VERSION_MANUAL="${{ inputs['version-manual'] }}"
          if [ -n "$VERSION_MANUAL" ]; then
            VERSION="$VERSION_MANUAL"
          else
            VERSION="$(date +"%y.%-m.%-d")"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "PORTABLE_ZIP=shotcut-win64-$VERSION.zip" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "portable_zip=shotcut-win64-$VERSION.zip" >> "$GITHUB_OUTPUT"

      - name: Download portable from S3
        shell: bash
        run: aws s3 cp "s3://builds.us.meltytech/shotcut/$PORTABLE_ZIP" . --no-progress

      - name: Extract portable zip
        shell: msys2 {0}
        run: unzip -q "$PORTABLE_ZIP"

      - name: Setup SM_CLIENT_CERT_FILE
        shell: bash
        run: |
          printf "%s" "${{ secrets.SM_CLIENT_CERT_FILE_B64 }}" | base64 --decode > "$SM_CLIENT_CERT_FILE"

      - name: Setup Software Trust Manager
        uses: digicert/code-signing-software-trust-action@v1
        with:
          simple-signing-mode: true

      - name: Sign all the executables
        shell: bash
        run: |
          smctl healthcheck
          for EXE in Shotcut/*.exe; do
            echo Signing ${EXE}
            smctl sign --simple --keypair-alias key_1464644718 --input ${EXE}
          done

      - name: Rebuild signed portable zip
        shell: msys2 {0}
        run: |
          rm "$PORTABLE_ZIP"
          zip -gr "$PORTABLE_ZIP" Shotcut

      - name: Upload signed portable artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-x64-portable-signed
          path: ./${{ steps.set_version.outputs.portable_zip }}

      - name: Setup ISCC
        shell: msys2 {0}
        run: |
          mkdir -p "$HOME/bin"
          pushd "$HOME/bin"
          curl -kLO --no-progress-meter https://s3.amazonaws.com/misc.meltymedia/shotcut-build/iscc632.txz
          tar -xJf iscc632.txz
          popd

      - name: Package installer
        shell: msys2 {0}
        run: |
          PATH="$HOME/bin:$PATH"
          cp packaging/windows/shotcut.iss .
          sed -i "s/YY.MM.DD/$VERSION/" shotcut.iss
          echo Extracting installer dependencies
          curl -kLO --no-progress-meter https://s3.amazonaws.com/misc.meltymedia/shotcut-build/innosetup-opera-1.txz
          tar -xJf innosetup-opera-1.txz
          rm innosetup-opera-1.txz
          echo Running Inno Setup Compiler
          ISCC -Q -O. shotcut.iss

      - name: Sign installer
        shell: bash
        run: |
          smctl healthcheck
          smctl sign --simple --keypair-alias key_1464644718 --input shotcut-setup.exe
          mv shotcut-setup.exe shotcut-win64-$VERSION.exe

      - name: Upload signed installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-x64-installer-signed
          path: ./shotcut-win64-${{ steps.set_version.outputs.version }}.exe

      - name: Upload signed packages to S3
        shell: bash
        run: |
          for file in "$PORTABLE_ZIP" shotcut-win64-$VERSION.exe; do
            echo Uploading "$file" to S3
            aws s3 cp "$file" s3://builds.us.meltytech/shotcut/ --no-progress
          done
